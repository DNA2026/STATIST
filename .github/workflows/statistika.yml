name: Automatické zpracování statistik inzerátů

on:
  repository_dispatch:
    types: [novy_import_statistiky]

jobs:
  zpracovani_dat:
    runs-on: ubuntu-latest

    steps:
      - name: Kontrola zdrojového kódu
        uses: actions/checkout@v4

      - name: Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalace závislostí
        run: |
          python -m pip install --upgrade pip

      - name: Spuštění Python skriptu pro analýzu
        env:
          DATA_DATUM: ${{ github.event.client_payload.datum }}
          DATA_INZERATY: ${{ github.event.client_payload.surove_inzeraty }}
          DATA_MAKLERI: ${{ toJSON(github.event.client_payload.makleri) }}
        run: |
          python statistika.py

      - name: Uložení aktualizované statistiky do repozitáře
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add statistika_historie.csv || true
          git commit -m "Automatická aktualizace statistiky pro data z Googlu [skip ci]" || true
          git push || true
